brand_context_ref: tests/fixtures/brand_context.md
rules: |
  Decide how to react to this tweet.
source_category_map:
  mentions: brand
source_rules:
  brand: |
    - Prefer supportive replies for true brand engagement.
priority_rules: |
  - If two actions fit, prefer the one with clearer execution value.
anti_patterns: |
  - Do not force engagement when the tweet is not relevant.
output_schema:
  suggestedAction:
    type: enum
    values: [reply_supportive, qrt_positioning, collab_opportunity, like_only, explore_signal, escalate_internal, none]
    description: Action type
  replyAngle:
    type: string
    max_length: 300
    description: Reply angle
  tones:
    type: array
    min_items: 1
    max_items: 3
    item_fields: [id, label, description]
    description: Tone options
