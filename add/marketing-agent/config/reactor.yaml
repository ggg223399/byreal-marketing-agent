source_rules:
  brand: |
    ## Brand / Mention Sources

    - Tweets that only mention or tag Emily Rio Freeman (@emilyRioFreeman) should
      usually be treated as internal-review items rather than normal reply work.
      If the tweet is about Emily in a founder/personal context without a clear
      Byreal brand reply opportunity, prefer `escalate_internal` so it routes to
      escalation for human review. Only choose a public-facing action when the
      tweet clearly becomes a true Byreal brand issue, product question,
      collaboration request, or urgent complaint that merits an external response.

    - red: public criticism or urgent complaint — prefer `escalate_internal`
      or `reply_supportive`; angle should acknowledge the concern directly.
      Never `like_only`.
    - orange: positive engagement opportunity — choose between
      `reply_supportive` and `qrt_positioning` based on content.
    - yellow: low priority — usually `like_only`, `explore_signal`, or `none`.

  trend: |
    ## Trend / Explore Sources

    - orange/yellow trend content that mainly reads like hype, launch promo,
      token marketing, or repetitive self-promotion should usually be `none`.
    - Use `explore_signal` for real narrative insight, product framing,
      distribution shifts, or early operator signal that the team should see.
    - Use `qrt_positioning` when we have a sharp public angle and Byreal is a
      natural fit for the narrative.
    - Use `collab_opportunity` when the tweet reveals a credible integration,
      distribution, or BD opening.

  ecosystem: |
    ## Ecosystem Sources

    - orange ecosystem signals are usually `qrt_positioning`,
      `explore_signal`, or `collab_opportunity`.
    - Use `like_only` only when the main value is maintaining visibility with a
      relevant account.
    - yellow ecosystem content should only be `like_only` when acknowledging
      the post has relationship value; otherwise prefer `explore_signal` or `none`.

  kol: |
    ## KOL Sources

    - orange KOL signals are usually public engagement opportunities — choose
      between `reply_supportive` and `qrt_positioning` based on content.
    - yellow KOL content should only be `like_only` when a lightweight social
      touchpoint is genuinely useful. If the post has learning value but no
      clear engagement value, prefer `explore_signal`.

  intelligence: |
    ## Intelligence Sources

    - orange intelligence signals are usually `qrt_positioning`,
      `explore_signal`, or `collab_opportunity`.
    - Choose `collab_opportunity` when the signal points to concrete APIs,
      wallets, infra primitives, data surfaces, or distribution channels that
      Byreal could realistically plug into.
    - yellow intelligence content with learning value but low engagement value
      should prefer `explore_signal` over `like_only`.

  crisis: |
    ## Crisis Sources

    - red crisis: only choose `escalate_internal` when the incident has direct
      Byreal, Bybit Alpha routing, core integration, or user exposure.
      If it is serious but unrelated, prefer `none` or `explore_signal`.
    - orange/yellow crisis without clear Byreal exposure should usually be `none`.
      Only use `explore_signal` when the event is strategically important for
      internal awareness beyond routine ecosystem noise.

priority_rules: |
  ## Priority Rules

  - If a signal is both "interesting for QRT" and "credible collab opening",
    prefer `collab_opportunity`.
  - If a signal could fit both `like_only` and `explore_signal`, prefer `like_only`
    so light engagement stays in the engagement queue.
  - When content is clearly worth team attention as a discovery signal but does
    not justify reply, QRT, collab, escalation, or even a lightweight like,
    use `explore_signal`.

anti_patterns: |
  ## Anti-Patterns

  - Do NOT use `like_only` for token shilling, launch spam, generic hype, or filler.
  - Default to `none` for filler, shill, or low-signal commentary unless there
    is a concrete reason to route it elsewhere.
  - Do not escalate unrelated ecosystem incidents just because the language is dramatic.

output_schema:
  suggestedAction:
    type: enum
    values: [reply_supportive, qrt_positioning, collab_opportunity, like_only, explore_signal, escalate_internal, none]
    description: What action to take
  replyAngle:
    type: string
    max_length: 300
    description: Direction and key points for the Generator
  tones:
    type: array
    min_items: 1
    max_items: 3
    item_fields: [id, label, description]
    description: "2-3 tone options for the Generator. Each has id (snake_case), label (display name), description (how this tone shapes the reply). First tone is the recommended one."
